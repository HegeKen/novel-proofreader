name: Build Android

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: aarch64-linux-android
            android: true
            android_arch: aarch64
          - platform: ubuntu-22.04
            target: armv7-linux-androideabi
            android: true
            android_arch: armv7
          - platform: ubuntu-22.04
            target: x86_64-linux-android
            android: true
            android_arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Android targets
        run: |
          rustup target add ${{ matrix.target }}
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            cmdline-tools;latest
            ndk;25.1.8937393
          accept-android-sdk-licenses: true

      - name: Install Android dependencies
        run: |
          cargo install cargo-ndk
          cargo install tauri-cli

      - name: Install Android Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk libc6-dev libstdc++-10-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      # 初始化 Android 项目
      - name: Initialize Android project
        run: |
          cd src-tauri
          cargo tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      # Android签名：创建keystore.properties文件
      - name: Setup Android signing
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # 修改 build.gradle.kts 添加签名配置
      - name: Configure signing in build.gradle.kts
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
          cat >> src-tauri/gen/android/app/build.gradle.kts << 'EOF'

      # 修改 build.gradle.kts 添加签名配置
      - name: Configure signing in build.gradle.kts
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
          cat > src-tauri/gen/android/app/build.gradle.kts.append << 'KOTLIN_EOF'

          import java.io.FileInputStream
          import java.util.Properties

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          KOTLIN_EOF

          # 将生成的配置追加到 build.gradle.kts
          cat src-tauri/gen/android/app/build.gradle.kts.append >> src-tauri/gen/android/app/build.gradle.kts
          rm src-tauri/gen/android/app/build.gradle.kts.append

      # Android构建步骤
      - name: Build Tauri app for Android
        run: |
          cd src-tauri
          cargo tauri android build --target ${{ matrix.android_arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
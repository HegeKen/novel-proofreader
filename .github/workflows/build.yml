name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
  HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}
  HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Android构建配置
          - platform: ubuntu-22.04
            target: aarch64-linux-android
            android: true
            android_arch: aarch64
          - platform: ubuntu-22.04
            target: armv7-linux-androideabi
            android: true
            android_arch: armv7
          - platform: ubuntu-22.04
            target: x86_64-linux-android
            android: true
            android_arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Windows特定配置
      - name: Install Windows targets and tools
        if: ${{ matrix.platform == 'windows-latest' }}
        run: |
          rustup target add ${{ matrix.target }}
          choco install nuget.commandline
        shell: powershell

      # Android特定配置
      - name: Install Android targets
        if: ${{ matrix.android }}
        run: |
          rustup target add ${{ matrix.target }}
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Install non-Android targets
        if: ${{ !matrix.android }}
        run: |
          rustup target add ${{ matrix.target }}

      # Android特定：安装Java 17
      - name: Setup Java for Android
        if: ${{ matrix.android }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: ${{ matrix.android }}
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            cmdline-tools;latest
            ndk;25.1.8937393
          accept-android-sdk-licenses: true

      - name: Install Android dependencies
        if: ${{ matrix.android }}
        run: |
          cargo install cargo-ndk
          cargo install tauri-cli

      - name: Install Linux dependencies
        if: ${{ matrix.platform == 'ubuntu-22.04' && !matrix.android }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Android Linux dependencies
        if: ${{ matrix.android }}
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk libc6-dev libstdc++-10-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      # macOS签名：导入Apple Developer ID证书
      - name: Import Apple Developer ID certificate
        if: ${{ matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true' }}
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # Windows签名：安装证书
      - name: Install Windows code signing certificate
        if: ${{ matrix.platform == 'windows-latest' && env.HAS_WINDOWS_CERT == 'true' }}
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}")
          $certPath = Join-Path $env:TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "Certificate saved to $certPath"
        shell: powershell

      # 初始化 Android 项目
      - name: Initialize Android project
        if: ${{ matrix.android }}
        run: |
          cd src-tauri
          cargo tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      # Android签名：创建keystore.properties文件
      - name: Setup Android signing
        if: ${{ matrix.android && env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # 修改 build.gradle.kts 添加签名配置
      - name: Configure signing in build.gradle.kts
        if: ${{ matrix.android && env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
      # 修改 build.gradle.kts 添加签名配置
      - name: Configure signing in build.gradle.kts
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        run: |
          cat > src-tauri/gen/android/app/build.gradle.kts.append << 'KOTLIN_EOF'

          import java.io.FileInputStream
          import java.util.Properties

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          KOTLIN_EOF

          # 将生成的配置追加到 build.gradle.kts
          cat src-tauri/gen/android/app/build.gradle.kts.append >> src-tauri/gen/android/app/build.gradle.kts
          rm src-tauri/gen/android/app/build.gradle.kts.append

      # Android构建步骤
      - name: Build Tauri app for Android
        if: ${{ matrix.android }}
        run: |
          cd src-tauri
          cargo tauri android build --target ${{ matrix.android_arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      # macOS构建（带签名）
      - name: Build Tauri app for macOS (signed)
        if: ${{ matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TAURI_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target ${{ matrix.target }}

      # macOS构建（无签名）
      - name: Build Tauri app for macOS (unsigned)
        if: ${{ matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT != 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # Windows构建（带签名）
      - name: Build Tauri app for Windows (signed)
        if: ${{ matrix.platform == 'windows-latest' && env.HAS_WINDOWS_CERT == 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_WINDOWS_CERTIFICATE_PATH: ${{ runner.temp }}\codesign.pfx
          TAURI_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      # Windows构建（无签名）
      - name: Build Tauri app for Windows (unsigned)
        if: ${{ matrix.platform == 'windows-latest' && env.HAS_WINDOWS_CERT != 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # Linux构建
      - name: Build Tauri app for Linux
        if: ${{ matrix.platform == 'ubuntu-22.04' && !matrix.android }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
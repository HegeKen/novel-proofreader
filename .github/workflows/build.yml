name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Android构建配置
          - platform: ubuntu-22.04
            target: aarch64-linux-android
            android: true
            android_arch: aarch64
          - platform: ubuntu-22.04
            target: armv7-linux-androideabi
            android: true
            android_arch: armv7
          - platform: ubuntu-22.04
            target: x86_64-linux-android
            android: true
            android_arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Windows特定配置
      - name: Install Windows targets and tools
        if: matrix.platform == 'windows-latest'
        run: |
          rustup target add ${{ matrix.target }}
          choco install nuget.commandline
        shell: powershell

      # Android特定配置
      - name: Install Android targets
        if: matrix.android
        run: |
          rustup target add ${{ matrix.target }}
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Install non-Android targets
        if: "!matrix.android"
        run: |
          rustup target add ${{ matrix.target }}

      # Android特定：安装Java 17
      - name: Setup Java for Android
        if: matrix.android
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.android
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            cmdline-tools;latest
            ndk;25.1.8937393
          accept-android-sdk-licenses: true

      - name: Install Android dependencies
        if: matrix.android
        run: |
          cargo install cargo-ndk
          cargo install tauri-cli

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' && !matrix.android
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Android Linux dependencies
        if: matrix.android
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk libc6-dev libstdc++-10-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create Android keystore
        if: matrix.android && secrets.ANDROID_KEYSTORE_BASE64
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/keystore.jks
          echo "ANDROID_KEYSTORE=$HOME/keystore.jks" >> $GITHUB_ENV
        shell: bash

      # Android构建步骤（带签名）
      - name: Initialize Android project
        if: matrix.android
        run: |
          cd src-tauri
          cargo tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      - name: Build Tauri app for Android (signed)
        if: matrix.android && secrets.ANDROID_KEYSTORE_BASE64
        run: |
          cd src-tauri
          ./gen/android/gradlew -p gen/android assembleRelease --warning-mode all \
            -Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
          cargo tauri android build --target ${{ matrix.android_arch }} --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24

      - name: Build Tauri app for Android (unsigned)
        if: matrix.android && !secrets.ANDROID_KEYSTORE_BASE64
        run: |
          cd src-tauri
          ./gen/android/gradlew -p gen/android assembleRelease --warning-mode all
          cargo tauri android build --target ${{ matrix.android_arch }} --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_MIN_SDK_VERSION: 24


      # macOS构建（无签名）
      - name: Build Tauri app for macOS (unsigned)
        if: matrix.platform == 'macos-latest' && !secrets.APPLE_CERTIFICATE_BASE64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # Windows构建（无签名）
      - name: Build Tauri app for Windows (unsigned)
        if: matrix.platform == 'windows-latest' && !secrets.WINDOWS_CERTIFICATE_BASE64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # Linux构建
      - name: Build Tauri app for Linux
        if: matrix.platform == 'ubuntu-22.04' && !matrix.android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
          generate_release_notes: true